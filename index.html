<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="app.js"></script>
</head>
<body>
    <h1>Rock-Paper-Scissors</h1>

    <div id="button-action">
        <button id="rock" class="user-choice">✊</button>
        <button id="paper" class="user-choice">✋</button>
        <button id="scissors" class="user-choice">✌️</button>
    </div>

    <div id="display-choice">
        <p id="result"></p>
       <p><span id="display-user"></span><span id="display-computer"></span></p> 
    </div>

    <div id="results-display">
        <span>User Score: <span id="user-score">0</span></span>,
        <span>Computer Score: <span id="computer-score">0</span></span>,
        <span>Tie Score:  <span id="tie-score">0</span></span>
    </div>

    <div>
        <button id="reset-score">Reset Score</button>
    </div>
</body>
</html>
